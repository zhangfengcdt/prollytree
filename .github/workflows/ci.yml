name: CI

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    strategy:
      matrix:
        include:
          - feature_flags: "--no-default-features"
            name: "minimal"
          - feature_flags: "--no-default-features --features git"
            name: "git-only"
          - feature_flags: "--no-default-features --features 'git agent'"
            name: "git-agent"
          - feature_flags: ""
            name: "default"
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: build (${{ matrix.name }})
      run: cargo build --all --verbose ${{ matrix.feature_flags }}

    - name: test (${{ matrix.name }})
      run: cargo test --verbose ${{ matrix.feature_flags }}

    - name: clippy (${{ matrix.name }})
      run: cargo clippy --all ${{ matrix.feature_flags }}

  docs:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: build benchmarks
      run: cargo test --benches --no-run --verbose

    - name: docs
      run: cargo doc --document-private-items --no-deps
